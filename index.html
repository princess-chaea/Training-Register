<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Training System Premium</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <style>
        body { font-family: 'Inter', 'Noto Sans KR', sans-serif; overflow-x: hidden; background-color: #f8fafc !important; color: #1e293b !important; }
        .font-outfit { font-family: 'Outfit', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.9) !important; backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .animate-in { animation: animate-in 0.5s ease-out; }
        @keyframes animate-in { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .btn-hover { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .btn-hover:hover { transform: translateY(-1px); box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1); }
        .loading-bar { position: fixed; top: 0; left: 0; width: 100%; height: 3px; background: rgba(226, 232, 240, 0.3); overflow: hidden; z-index: 9999; }
        .loading-bar::after { content: ""; position: absolute; top: 0; left: 0; width: 40%; height: 100%; background: linear-gradient(90deg, #4f46e5, #818cf8, #4f46e5); animation: loading-bar-anim 1.2s infinite ease-in-out; }
        @keyframes loading-bar-anim { 0% { transform: translateX(-100%); } 100% { transform: translateX(250%); } }
    </style>
</head>
<body class="bg-[#f8fafc]">
    <div id="root">
        <div class="fixed inset-0 flex flex-col items-center justify-center bg-white">
            <div class="w-48 h-1 bg-slate-100 rounded-full overflow-hidden relative mb-4">
                <div class="absolute inset-0 bg-indigo-600 w-1/2 animate-[loading-bar-anim_1.2s_infinite_ease-in-out]"></div>
            </div>
            <p class="text-slate-400 text-sm font-medium">System Initializing...</p>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useRef, useEffect, useMemo, useLayoutEffect } = React;

        const Icon = ({ name, size = 20, className = "" }) => (
            <span className={`inline-flex items-center justify-center shrink-0 ${className}`} style={{ width: size, height: size }}>
                <i data-lucide={name} style={{ width: size, height: size }}></i>
            </span>
        );

        const GAS_APP_URL = "https://script.google.com/macros/s/AKfycbzbLAYsi6x1TV-KxIFVspjqg3s0WIqQvdxgUhW1WYVnyrTrBD8VegswbcZBFPaTAnSP/exec";
        const ABSENCE_REASONS = ["\uCD9C\uC7A5", "\uC5F0\uAC00", "\uBCD1\uAC00", "\uC870\uD1F4", "\uBCD1\uC870\uD1F4", "\uD734\uAC00", "\uAE30\uD0C0"];

        const App = () => {
            const [view, setView] = useState("user");
            const [adminSubView, setAdminSubView] = useState("dashboard");
            const [isLoading, setIsLoading] = useState(true);
            const [trainings, setTrainings] = useState([]);
            const [allStaff, setAllStaff] = useState([]);
            const [stats, setStats] = useState([]);
            const [selectedTraining, setSelectedTraining] = useState(null);
            const [searchName, setSearchName] = useState("");
            const [step, setStep] = useState(1);
            const [chosenStaff, setChosenStaff] = useState(null);
            const [regStatus, setRegStatus] = useState("attended");
            const [absenceReason, setAbsenceReason] = useState("\uCD9C\uC7A5");
            const [customAlert, setCustomAlert] = useState(null);
            
            const canvasRef = useRef(null);
            const isDrawingRef = useRef(false);

            useLayoutEffect(() => {
                if (window.lucide) {
                    const observer = new MutationObserver(() => lucide.createIcons());
                    observer.observe(document.getElementById("root"), { childList: true, subtree: true });
                    lucide.createIcons();
                }
            }, []);

            useEffect(() => { 
                fetchInitialData(); 
            }, []);

            const fetchInitialData = async () => {
                setIsLoading(true);
                try {
                    const [initRes, statsRes] = await Promise.all([
                        fetch(`${GAS_APP_URL}?action=getInitialData`),
                        fetch(`${GAS_APP_URL}?action=getDashboard`)
                    ]);
                    const initData = await initRes.json();
                    const statsData = await statsRes.json();
                    if (initData.error) throw new Error(initData.error);
                    setTrainings(initData.trainings || []);
                    setAllStaff(initData.staff || []);
                    setStats(statsData || []);
                } catch (e) {
                    setCustomAlert({ title: "\uC624\uB958", message: e.message });
                } finally {
                    setIsLoading(false);
                }
            };

            const fetchRegistrations = async (tid, title) => {
                try {
                    const res = await fetch(`${GAS_APP_URL}?action=getRegistrations&trainingId=${tid}&trainingTitle=${encodeURIComponent(title)}`);
                    return await res.json();
                } catch (e) { return []; }
            };

            const handleRegister = async () => {
                setIsLoading(true);
                try {
                    const signature = regStatus === "attended" ? canvasRef.current.toDataURL() : absenceReason;
                    const params = {
                        action: "register",
                        trainingId: selectedTraining.id,
                        trainingTitle: selectedTraining.title,
                        name: chosenStaff.name,
                        position: chosenStaff.position,
                        grade: chosenStaff.grade,
                        status: regStatus,
                        content: signature
                    };
                    await fetch(GAS_APP_URL, { method: "POST", body: JSON.stringify(params) });
                    setStep(5);
                    fetchInitialData(); // 통계 업데이트를 위해 다시 불러오기
                } catch (e) { alert(e.message); }
                setIsLoading(false);
            };

            const handlePrint = async (training) => {
                setIsLoading(true);
                const regs = await fetchRegistrations(training.id, training.title);
                setIsLoading(false);
                
                const win = window.open("", "_blank");
                let targetNames = [];
                try { targetNames = JSON.parse(training.targetParticipants || "[]"); } catch(e){}
                
                let list = targetNames.length > 0 ? targetNames.map(n => {
                    const r = regs.find(reg => reg.name === n);
                    const s = allStaff.find(st => st.name === n);
                    return r || { name: n, position: s?.position || "", grade: s?.grade || "", status: "absent", content: "" };
                }) : regs;

                // 수기 등록자(명단 외 인원) 추가
                const attendedNames = regs.filter(r => r.status === 'attended').map(r => r.name);
                const extraRegs = regs.filter(r => !targetNames.includes(r.name));
                list = [...list, ...extraRegs];

                const isDual = list.length > 20;
                const half = isDual ? Math.ceil(list.length / 2) : list.length;
                const left = list.slice(0, half);
                const right = list.slice(half);

                const tableHtml = (l, skip) => `
                    <table style="width:100%; border-collapse:collapse; font-size:9pt; margin-bottom:10px;">
                        <thead><tr style="background:#f3f3f3;">
                            <th style="border:1pt solid black; width:30px;">No.</th>
                            <th style="border:1pt solid black; width:100px;">\uC18C\uC18D</th>
                            <th style="border:1pt solid black; width:60px;">\uC9C1\uC704</th>
                            <th style="border:1pt solid black; width:70px;">\uC131\uBA85</th>
                            <th style="border:1pt solid black; width:100px;">\uC11C\uBA85</th>
                            <th style="border:1pt solid black;">\uBE44\uACE0</th>
                        </tr></thead>
                        <tbody>${l.map((r, i) => `
                            <tr style="height:35px;">
                                <td style="border:1pt solid black; text-align:center;">${skip + i + 1}</td>
                                <td style="border:1pt solid black; text-align:center;">${r.grade || "\uD558\uC900\uCD08\uB4F1\uD559\uAD50"}</td>
                                <td style="border:1pt solid black; text-align:center;">${r.position}</td>
                                <td style="border:1pt solid black; text-align:center;">${r.name}</td>
                                <td style="border:1pt solid black; text-align:center;">${r.status==="attended"?'V':''}</td>
                                <td style="border:1pt solid black; text-align:center; color:red; font-size:8pt;">${r.status==="absent"?(r.content||""):""}</td>
                            </tr>`).join("")}</tbody>
                    </table>`;

                win.document.write(`<html><head><title>Print</title><style>body{padding:20px; font-family:sans-serif;} .container{display:flex; gap:15px;}</style></head>
                    <body><h1 style="text-align:center; margin-bottom:20px;">${training.title}</h1>
                    <div class="container"><div style="flex:1;">${tableHtml(left, 0)}</div>${isDual ? `<div style="flex:1;">${tableHtml(right, half)}</div>` : ""}</div>
                    <script>window.onload=()=>{window.print();window.close();};<\/script></body></html>`);
                win.document.close();
            };

            const filteredStaffList = useMemo(() => {
                if (!searchName.trim()) return [];
                let pool = allStaff;
                if (selectedTraining && String(selectedTraining.targetParticipants).toUpperCase() !== "ALL") {
                    try {
                        const targets = JSON.parse(selectedTraining.targetParticipants);
                        pool = allStaff.filter(s => targets.includes(s.name));
                    } catch (e) {}
                }
                return pool.filter(s => s.name.includes(searchName));
            }, [searchName, allStaff, selectedTraining]);

            if (isLoading) {
                return (
                    <div className="fixed inset-0 flex flex-col items-center justify-center bg-white z-[9999]">
                        <div className="w-48 h-1 bg-slate-100 rounded-full overflow-hidden relative mb-4">
                            <div class="absolute inset-0 bg-indigo-600 w-1/2 animate-[loading-bar-anim_1.2s_infinite_ease-in-out]"></div>
                        </div>
                        <p class="text-slate-400 text-sm font-medium font-outfit">\uB370\uC774\uD130\uB97C \uBD88\uB7EC\uC624\uB294 \uC911\uC785\uB2C8\uB2E4...</p>
                    </div>
                );
            }

            return (
                <div className="min-h-screen pb-20 animate-in">
                    <nav className="sticky top-0 z-50 w-full px-6 py-4 glass border-b">
                        <div className="max-w-5xl mx-auto flex justify-between items-center">
                            <div className="flex items-center gap-3">
                                <div className="w-10 h-10 bg-indigo-50 rounded-2xl flex items-center justify-center"><Icon name="users" size={20} className="text-indigo-600" /></div>
                                <span className="font-outfit font-black text-xl text-indigo-900">\uC5F0\uC218 \uD2B9\uB85D\uBD80</span>
                            </div>
                            <button onClick={() => setView(view === "user" ? "admin" : "user")} className="flex items-center gap-2 px-4 py-2 bg-white border rounded-xl font-bold text-sm btn-hover shadow-sm">
                                {view === "user" ? <Icon name="settings" size={16}/> : <Icon name="log-out" size={16}/>}
                                {view === "user" ? "\uAD00\uB9AC \uBAA8\uB4DC" : "\uC0AC\uC6A9\uC790 \uD654\uBA74"}
                            </button>
                        </div>
                    </nav>
                    <main className="max-w-4xl mx-auto px-6 mt-8">
                        {view === "admin" ? (
                            <div className="space-y-6">
                                <div className="flex bg-slate-200/50 p-1 rounded-2xl w-fit mx-auto md:mx-0">
                                    <button onClick={() => setAdminSubView('dashboard')} className={`px-6 py-2 rounded-xl text-sm font-bold ${adminSubView === 'dashboard'?'bg-white shadow-sm':''}`}>\uB300\uC2DC\uBCF4\uB4DC</button>
                                    <button onClick={() => setAdminSubView('list')} className={`px-6 py-2 rounded-xl text-sm font-bold ${adminSubView === 'list'?'bg-white shadow-sm':''}`}>\uBAA9\uB85D & \uC778\uC104</button>
                                </div>
                                
                                {adminSubView === 'dashboard' && (
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        {stats.map(s => (
                                            <div key={s.id} className="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100 flex flex-col justify-between">
                                                <div>
                                                    <div className="text-sm text-slate-400 font-bold mb-1">{s.title}</div>
                                                    <div className="flex items-end gap-2">
                                                        <span className="text-3xl font-black text-indigo-600">{s.attended}</span>
                                                        <span className="text-lg font-bold text-slate-300">/ {s.total}\uBA85 (\uCC38\uC11D)</span>
                                                    </div>
                                                </div>
                                                <div className="mt-6 flex gap-2">
                                                    <button onClick={()=>handlePrint(trainings.find(t=>t.id===s.id))} className="flex-1 p-3 bg-slate-50 rounded-xl hover:bg-slate-100 transition-colors flex justify-center items-center gap-2 font-bold text-xs"><Icon name="printer" size={14}/>\uC778\uC144 \uCD9C\uB825</button>
                                                    <button onClick={()=>window.open(`${GAS_APP_URL}?action=exportToExcel&id=${s.id}`, '_blank')} className="flex-1 p-3 bg-emerald-50 text-emerald-700 rounded-xl hover:bg-emerald-100 transition-colors flex justify-center items-center gap-2 font-bold text-xs"><Icon name="download" size={14}/>Excel</button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                                
                                {adminSubView === 'list' && (
                                    <div className="space-y-4">
                                        {trainings.map(t => (
                                            <div key={t.id} className="bg-white p-6 rounded-3xl border flex justify-between items-center shadow-sm">
                                                <div><p className="font-bold text-lg">{t.title}</p><p className="text-xs text-slate-400">{t.date}</p></div>
                                                <div className="flex gap-2">
                                                    <button onClick={()=>handlePrint(t)} className="p-3 bg-slate-100 rounded-xl hover:bg-slate-200 transition-colors"><Icon name="printer" size={20}/></button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        ) : (
                            <div className="max-w-xl mx-auto bg-white p-10 rounded-[3rem] shadow-2xl min-h-[500px] border border-slate-50">
                                {step === 1 && (
                                    <div className="space-y-6 animate-in">
                                        <h2 className="text-2xl font-black text-center text-slate-900">\uC5F0\uC218\uB97C \uC120\uD0DD\uD574 \uC9FC\uC138\uC694</h2>
                                        <div className="space-y-3">
                                            {trainings.map(t => (
                                                <button key={t.id} onClick={()=>{setSelectedTraining(t); setStep(2);}} className="w-full p-6 border-2 border-slate-50 bg-slate-50/50 rounded-3xl text-left flex justify-between items-center hover:border-indigo-500 hover:bg-indigo-50/30 transition-all group">
                                                    <div><div className="font-bold text-lg group-hover:text-indigo-600 transition-colors">{t.title}</div><div className="text-xs text-slate-400 mt-1">{t.date} | {t.location}</div></div>
                                                    <Icon name="chevron-right" size={20} className="text-slate-300 group-hover:text-indigo-500"/>
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                )}
                                {step === 2 && (
                                    <div className="space-y-6 animate-in">
                                        <div className="flex items-center gap-2 mb-4">
                                            <button onClick={()=>setStep(1)} className="p-2 hover:bg-slate-100 rounded-full"><Icon name="arrow-left" size={20}/></button>
                                            <h2 className="text-xl font-bold">\uC131\uD568\uC744 \uAC80\uC0C9\uD574 \uC9FC\uC138\uC694</h2>
                                        </div>
                                        <div className="relative">
                                            <input type="text" placeholder="\uC131\uD568 \uC785\uB825 (\uC608: \uD64D\uAE38\uB3D9)" className="w-full p-5 pl-12 border-2 border-slate-100 rounded-[1.5rem] focus:border-indigo-500 outline-none font-bold text-lg" value={searchName} onChange={e=>setSearchName(e.target.value)} autoFocus/>
                                            <Icon name="search" size={20} className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-300"/>
                                        </div>
                                        <div className="space-y-2 max-h-72 overflow-y-auto pr-2 custom-scrollbar">
                                            {filteredStaffList.map(s => (
                                                <button key={s.id} onClick={()=>{setChosenStaff(s); setStep(3);}} className="w-full p-5 bg-white border border-slate-100 rounded-2xl text-left font-bold hover:bg-indigo-600 hover:text-white transition-all flex justify-between items-center">
                                                    <span>{s.name} <span className="opacity-60 text-sm font-normal">({s.position})</span></span>
                                                    <Icon name="plus-circle" size={18}/>
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                )}
                                {step === 3 && (
                                    <div className="space-y-10 text-center py-10 animate-in">
                                        <div>
                                            <h2 className="text-3xl font-black mb-2 text-indigo-600">{chosenStaff.name} \uB2D8</h2>
                                            <p className="text-slate-400 font-bold">\uC5F0\uC218\uC5D0 \uCC38\uC11D\uD558\uC168\uB098\uC694?</p>
                                        </div>
                                        <div className="flex gap-4">
                                            <button onClick={()=>{setRegStatus("attended"); setStep(4);}} className="flex-1 p-8 border-2 border-indigo-500 rounded-[2.5rem] font-black text-2xl bg-indigo-600 text-white shadow-lg shadow-indigo-100 active:scale-95 transition-transform">\uCC38\uC11D</button>
                                            <button onClick={()=>{setRegStatus("absent"); setStep(4);}} className="flex-1 p-8 border-2 border-slate-100 rounded-[2.5rem] font-black text-2xl text-slate-400 hover:bg-slate-50 active:scale-95 transition-transform">\uBD88\uCC38</button>
                                        </div>
                                    </div>
                                )}
                                {step === 4 && (
                                    <div className="space-y-8 animate-in text-center">
                                        <h2 className="text-2xl font-black">{regStatus==="attended"?"\uC815\uC131\uC2A4\uB7FD\uAC8C \uC11C\uBA85\uD574 \uC9FC\uC138\uC694":"\uBD88\uCC38 \uC0AC\uC720\uB97C \uC120\uD0DD\uD574 \uC9FC\uC138\uC694"}</h2>
                                        {regStatus === "attended" ? (
                                            <div className="relative border-4 border-dashed border-slate-100 rounded-[2.5rem] h-64 bg-slate-50/50 overflow-hidden cursor-crosshair">
                                                <canvas ref={canvasRef} width={800} height={400} className="w-full h-full"
                                                    onMouseDown={e=>{
                                                        isDrawingRef.current = true;
                                                        const ctx = canvasRef.current.getContext("2d");
                                                        const r = canvasRef.current.getBoundingClientRect();
                                                        ctx.lineWidth = 6;
                                                        ctx.lineCap = "round";
                                                        ctx.lineJoin = "round";
                                                        ctx.strokeStyle = "#1e293b";
                                                        ctx.beginPath();
                                                        ctx.moveTo((e.clientX - r.left) * (800 / r.width), (e.clientY - r.top) * (400 / r.height));
                                                    }}
                                                    onMouseMove={e=>{
                                                        if (!isDrawingRef.current) return;
                                                        const ctx = canvasRef.current.getContext("2d");
                                                        const r = canvasRef.current.getBoundingClientRect();
                                                        ctx.lineTo((e.clientX - r.left) * (800 / r.width), (e.clientY - r.top) * (400 / r.height));
                                                        ctx.stroke();
                                                    }}
                                                    onMouseUp={() => { isDrawingRef.current = false; }}
                                                    onMouseOut={() => { isDrawingRef.current = false; }}
                                                />
                                                <div className="absolute bottom-4 right-6 pointer-events-none opacity-20 font-black text-2xl italic text-slate-400">Signature Here</div>
                                            </div>
                                        ) : (
                                            <div className="grid grid-cols-2 gap-3">
                                                {ABSENCE_REASONS.map(reason => (
                                                    <button key={reason} onClick={()=>setAbsenceReason(reason)} className={`p-5 rounded-2xl font-bold border-2 transition-all ${absenceReason === reason?'border-indigo-600 bg-indigo-50 text-indigo-600':'border-slate-100 bg-white text-slate-400'}`}>{reason}</button>
                                                ))}
                                            </div>
                                        )}
                                        <button onClick={handleRegister} className="w-full bg-slate-900 text-white p-6 rounded-[2rem] font-black text-xl shadow-xl shadow-slate-200 active:scale-98 transition-all hover:bg-black font-outfit">\uB4F1\uB85D \uC644\uB8CC (Submit)</button>
                                    </div>
                                )}
                                {step === 5 && (
                                    <div className="text-center py-16 space-y-8 animate-in">
                                        <div className="flex justify-center"><div className="w-24 h-24 bg-emerald-50 text-emerald-600 rounded-full flex items-center justify-center animate-bounce shadow-lg shadow-emerald-50"><Icon name="check-circle-2" size={64} /></div></div>
                                        <div><h2 className="text-3xl font-black text-slate-900">\uB4F1\uB85D\uC774 \uC644\uB8CC\uB418\uC5C8\uC2B5\uB2C8\uB2E4!</h2><p className="text-slate-400 font-bold mt-2">\uC218\uACE0\uD558\uC168\uC2B5\uB2C8\uB2E4.</p></div>
                                        <button onClick={()=>{setStep(1); setSearchName(""); setSelectedTraining(null);}} className="px-10 py-4 bg-slate-900 text-white rounded-[1.5rem] font-black shadow-lg shadow-slate-100 hover:scale-105 active:scale-95 transition-all text-lg">\uCC98\uC74C\uC73C\uB85C \uB3CC\uC544\uAC00\uAE30</button>
                                    </div>
                                )}
                            </div>
                        )}
                    </main>
                    {customAlert && (
                        <div className="fixed inset-0 flex items-center justify-center z-[100] p-6 bg-black/50 backdrop-blur-sm">
                            <div className="bg-white p-10 rounded-[2.5rem] shadow-2xl max-w-sm w-full text-center space-y-6">
                                <div className="w-16 h-16 bg-red-50 text-red-600 rounded-full flex items-center justify-center mx-auto"><Icon name="alert-triangle" size={32}/></div>
                                <div><h3 className="text-xl font-black text-slate-900">{customAlert.title}</h3><p className="text-slate-500 font-medium mt-2 break-all">{customAlert.message}</p></div>
                                <button onClick={()=>setCustomAlert(null)} className="w-full bg-slate-900 text-white p-5 rounded-2xl font-bold shadow-lg shadow-slate-100 active:scale-95 transition-transform">OK</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };
        ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
</body>
</html>
