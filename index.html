<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Training System</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <style>
        body { font-family: 'Inter', 'Noto Sans KR', sans-serif; overflow-x: hidden; background-color: #f8fafc !important; color: #1e293b !important; }
        .animate-in { animation: animate-in 0.5s ease-out; }
        @keyframes animate-in { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .loading-bar { position: fixed; top: 0; left: 0; width: 100%; height: 3px; background: rgba(226, 232, 240, 0.3); overflow: hidden; z-index: 9999; }
        .loading-bar::after { content: ""; position: absolute; top: 0; left: 0; width: 40%; height: 100%; background: linear-gradient(90deg, #4f46e5, #818cf8, #4f46e5); animation: loading-bar-anim 1.2s infinite ease-in-out; }
        @keyframes loading-bar-anim { 0% { transform: translateX(-100%); } 100% { transform: translateX(250%); } }
    </style>
</head>
<body class="bg-[#f8fafc]">
    <div id="root">
        <div class="fixed inset-0 flex flex-col items-center justify-center bg-white">
            <div class="w-48 h-1 bg-slate-100 rounded-full overflow-hidden relative mb-4">
                <div class="absolute inset-0 bg-indigo-600 w-1/2 animate-[loading-bar-anim_1.2s_infinite_ease-in-out]"></div>
            </div>
            <p class="text-slate-400 text-sm font-medium">System Loading...</p>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useRef, useEffect, useMemo, useLayoutEffect } = React;

        const Icon = ({ name, size = 20, className = "" }) => (
            <span className={`inline-flex items-center justify-center shrink-0 ${className}`} style={{ width: size, height: size }}>
                <i data-lucide={name} style={{ width: size, height: size }}></i>
            </span>
        );

        const GAS_APP_URL = "https://script.google.com/macros/s/AKfycbzbLAYsi6x1TV-KxIFVspjqg3s0WIqQvdxgUhW1WYVnyrTrBD8VegswbcZBFPaTAnSP/exec";

        const App = () => {
            const [view, setView] = useState("user");
            const [isLoading, setIsLoading] = useState(true);
            const [trainings, setTrainings] = useState([]);
            const [allStaff, setAllStaff] = useState([]);
            const [selectedTraining, setSelectedTraining] = useState(null);
            const [searchName, setSearchName] = useState("");
            const [step, setStep] = useState(1);
            const [chosenStaff, setChosenStaff] = useState(null);
            const [regStatus, setRegStatus] = useState("attended");
            const [customAlert, setCustomAlert] = useState(null);
            
            const canvasRef = useRef(null);
            const isDrawingRef = useRef(false);

            useLayoutEffect(() => {
                if (window.lucide) {
                    const observer = new MutationObserver(() => lucide.createIcons());
                    observer.observe(document.getElementById("root"), { childList: true, subtree: true });
                    lucide.createIcons();
                }
            }, []);

            useEffect(() => { 
                fetchInitialData(); 
            }, []);

            const fetchInitialData = async () => {
                try {
                    const res = await fetch(`${GAS_APP_URL}?action=getInitialData`);
                    const data = await res.json();
                    if (data.error) throw new Error(data.error);
                    setTrainings(data.trainings || []);
                    setAllStaff(data.staff || []);
                } catch (e) {
                    setCustomAlert({ title: "\uC624\uB958", message: e.message });
                } finally {
                    setIsLoading(false);
                }
            };

            const handleRegister = async () => {
                setIsLoading(true);
                try {
                    const signature = regStatus === "attended" ? canvasRef.current.toDataURL() : "";
                    const params = {
                        action: "register",
                        trainingId: selectedTraining.id,
                        trainingTitle: selectedTraining.title,
                        name: chosenStaff.name,
                        position: chosenStaff.position,
                        grade: chosenStaff.grade,
                        status: regStatus,
                        content: signature
                    };
                    await fetch(GAS_APP_URL, { method: "POST", body: JSON.stringify(params) });
                    setStep(5);
                } catch (e) { alert(e.message); }
                setIsLoading(false);
            };

            const filteredStaffList = useMemo(() => {
                if (!searchName.trim()) return [];
                return allStaff.filter(s => s.name.includes(searchName));
            }, [searchName, allStaff]);

            if (isLoading) {
                return (
                    <div className="fixed inset-0 flex flex-col items-center justify-center bg-white z-[9999]">
                        <div className="w-48 h-1 bg-slate-100 rounded-full overflow-hidden relative mb-4">
                            <div class="absolute inset-0 bg-indigo-600 w-1/2 animate-[loading-bar-anim_1.2s_infinite_ease-in-out]"></div>
                        </div>
                        <p class="text-slate-400 text-sm font-medium">\uB370\uC774\uD130\uB97C \uBD88\uB7EC\uC624\uB294 \uC911\uC785\uB2C8\uB2E4...</p>
                    </div>
                );
            }

            return (
                <div className="min-h-screen pb-20 animate-in">
                    <nav className="sticky top-0 z-50 w-full px-6 py-4 bg-white/80 backdrop-blur-md border-b">
                        <div className="max-w-5xl mx-auto flex justify-between items-center">
                            <span className="font-bold text-xl text-indigo-900">\uC5F0\uC218 \uD2B9\uB85D\uBD80</span>
                            <button onClick={() => setView(view === "user" ? "admin" : "user")} className="px-4 py-2 border rounded-xl text-sm font-bold">
                                {view === "user" ? "\uAD00\uB9AC \uBAA8\uB4DC" : "\uC0AC\uC6A9\uC790 \uD654\uBA74"}
                            </button>
                        </div>
                    </nav>
                    <main className="max-w-xl mx-auto px-6 mt-8">
                        {view === "admin" ? (
                            <div className="space-y-4">
                                <h2 className="text-xl font-bold">\uC5F0\uC218 \uBAA9\uB85D</h2>
                                {trainings.map(t => (
                                    <div key={t.id} className="bg-white p-4 rounded-2xl border flex justify-between items-center shadow-sm">
                                        <div><p className="font-bold">{t.title}</p><p className="text-xs text-slate-400">{t.date}</p></div>
                                        <button onClick={() => window.open(`${GAS_APP_URL}?action=getRegistrations&trainingId=${t.id}&trainingTitle=${encodeURIComponent(t.title)}`, '_blank')} className="p-2 bg-slate-100 rounded-lg">
                                            <Icon name="printer" size={18}/>
                                        </button>
                                    </div>
                                ))}
                            </div>
                        ) : (
                            <div className="bg-white p-8 rounded-[2.5rem] shadow-xl min-h-[400px]">
                                {step === 1 && (
                                    <div className="space-y-4">
                                        <h2 className="text-xl font-bold text-center">\uC5F0\uC218 \uC120\uD0DD</h2>
                                        {trainings.map(t => (
                                            <button key={t.id} onClick={()=>{setSelectedTraining(t); setStep(2);}} className="w-full p-5 border rounded-2xl text-left flex justify-between items-center hover:bg-slate-50 transition-colors">
                                                <span>{t.title}</span><Icon name="chevron-right" size={18} className="text-slate-300"/>
                                            </button>
                                        ))}
                                    </div>
                                )}
                                {step === 2 && (
                                    <div className="space-y-4">
                                        <input type="text" placeholder="\uC131\uD568 \uAC80\uC0C9" className="w-full p-4 border rounded-2xl" value={searchName} onChange={e=>setSearchName(e.target.value)}/>
                                        <div className="space-y-2 max-h-60 overflow-y-auto">
                                            {filteredStaffList.map(s => (
                                                <button key={s.id} onClick={()=>{setChosenStaff(s); setStep(3);}} className="w-full p-4 border rounded-xl text-left font-bold hover:bg-indigo-50">{s.name} ({s.position})</button>
                                            ))}
                                        </div>
                                    </div>
                                )}
                                {step === 3 && (
                                    <div className="space-y-6 text-center py-4">
                                        <h2 className="text-xl font-bold">{chosenStaff.name}\uB2D8 \uD655\uC778</h2>
                                        <div className="flex gap-3">
                                            <button onClick={()=>{setRegStatus("attended"); setStep(4);}} className="flex-1 p-6 border rounded-2xl font-bold bg-indigo-600 text-white">\uCC38\uC11D</button>
                                            <button onClick={()=>{setRegStatus("absent"); setStep(4);}} className="flex-1 p-6 border rounded-2xl font-bold hover:bg-slate-50">\uBD88\uCC38</button>
                                        </div>
                                    </div>
                                )}
                                {step === 4 && (
                                    <div className="space-y-6">
                                        <h2 className="text-xl font-bold text-center">{regStatus==="attended"?"\uC11C\uBA85":"\uBD88\uCC38 \uD655\uC778"}</h2>
                                        {regStatus === "attended" && (
                                            <div className="border border-slate-200 rounded-2xl h-48 bg-slate-50 overflow-hidden">
                                                <canvas ref={canvasRef} width={800} height={400} className="w-full h-full cursor-crosshair"
                                                    onMouseDown={e=>{
                                                        isDrawingRef.current = true;
                                                        const ctx = canvasRef.current.getContext("2d");
                                                        const rect = canvasRef.current.getBoundingClientRect();
                                                        ctx.beginPath();
                                                        ctx.moveTo((e.clientX - rect.left) * (800 / rect.width), (e.clientY - rect.top) * (400 / rect.height));
                                                    }}
                                                    onMouseMove={e=>{
                                                        if (!isDrawingRef.current) return;
                                                        const ctx = canvasRef.current.getContext("2d");
                                                        const rect = canvasRef.current.getBoundingClientRect();
                                                        ctx.lineTo((e.clientX - rect.left) * (800 / rect.width), (e.clientY - rect.top) * (400 / rect.height));
                                                        ctx.stroke();
                                                    }}
                                                    onMouseUp={() => { isDrawingRef.current = false; }}
                                                    onMouseOut={() => { isDrawingRef.current = false; }}
                                                />
                                            </div>
                                        )}
                                        <button onClick={handleRegister} className="w-full bg-indigo-600 text-white p-4 rounded-xl font-bold">\uB4F1\uB85D \uC644\uB8CC</button>
                                    </div>
                                )}
                                {step === 5 && (
                                    <div className="text-center py-10 space-y-4 text-emerald-600">
                                        <div className="flex justify-center"><Icon name="check-circle-2" size={48} /></div>
                                        <h2 className="text-2xl font-bold">\uB4F1\uB85D \uC644\uB8CC</h2>
                                        <button onClick={()=>{setStep(1); setSearchName("");}} className="px-6 py-2 bg-slate-900 text-white rounded-lg text-sm">\uCC98\uC74C\uC73C\uB85C</button>
                                    </div>
                                )}
                            </div>
                        )}
                    </main>
                    {customAlert && (
                        <div className="fixed inset-0 flex items-center justify-center z-[100] p-6 bg-black/50 backdrop-blur-sm">
                            <div className="bg-white p-8 rounded-3xl shadow-2xl max-w-sm w-full text-center space-y-4">
                                <h3 className="text-xl font-bold text-red-600">{customAlert.title}</h3>
                                <p className="text-slate-600 break-all">{customAlert.message}</p>
                                <button onClick={()=>setCustomAlert(null)} className="w-full bg-slate-900 text-white p-3 rounded-xl font-bold">OK</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };
        ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
</body>
</html>
