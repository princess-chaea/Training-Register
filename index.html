<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>학교 연수 등록 시스템</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <style>
        body {
            font-family: 'Inter', 'Noto Sans KR', sans-serif;
            overflow-x: hidden;
            background-color: #f8fafc !important; /* 배경색 고정 */
            color: #1e293b !important; /* 글자색 고정 */
        }
        
        @media (max-width: 640px) {
            .mobile-p-4 { padding: 1rem !important; }
            .mobile-p-6 { padding: 1.5rem !important; }
            .mobile-text-2xl { font-size: 1.5rem !important; }
            .mobile-min-h-500 { min-height: 400px !important; }
        }

        .font-outfit {
            font-family: 'Outfit', sans-serif;
        }

        .glass {
            background: rgba(255, 255, 255, 0.9) !important;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .animate-in {
            animation: animate-in 0.5s ease-out;
        }

        @keyframes animate-in {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .canvas-container {
            touch-action: none;
            position: relative;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #e2e8f0;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #cbd5e1;
        }

        .btn-hover {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-hover:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .btn-hover:active {
            transform: translateY(0);
        }
        @keyframes loading-bar-anim {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(250%); }
        }

        .loading-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: rgba(226, 232, 240, 0.3);
            overflow: hidden;
            z-index: 9999;
        }

        .loading-bar::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 40%;
            height: 100%;
            background: linear-gradient(90deg, #4f46e5, #818cf8, #4f46e5);
            animation: loading-bar-anim 1.2s infinite ease-in-out;
        }
    </style>
</head>

<body class="bg-[#f8fafc]">
    <div id="root">
        <!-- Pre-loader: App booting... -->
        <div class="fixed inset-0 flex items-center justify-center bg-white/50 backdrop-blur-sm transition-opacity duration-500">
            <div class="w-24 h-1 bg-slate-100 rounded-full overflow-hidden relative">
                <div class="absolute inset-0 bg-indigo-600 w-1/2 animate-[loading-bar-anim_1.2s_infinite_ease-in-out]"></div>
            </div>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useRef, useEffect, useMemo, useLayoutEffect } = React;

        // --- Lucide React Helper ---
        const Icon = ({ name, size = 20, className = "" }) => {
            return (
                <span className={`inline-flex items-center justify-center shrink-0 ${className}`} 
                      style={{ width: size, height: size, minWidth: size, minHeight: size }}>
                    <i data-lucide={name} style={{ width: size, height: size }}></i>
                </span>
            );
        };

        const Users = (props) => <Icon name="users" {...props} />;
        const Plus = (props) => <Icon name="plus" {...props} />;
        const Calendar = (props) => <Icon name="calendar" {...props} />;
        const Download = (props) => <Icon name="download" {...props} />;
        const Printer = (props) => <Icon name="printer" {...props} />;
        const CheckCircle2 = (props) => <Icon name="check-circle-2" {...props} />;
        const ChevronRight = (props) => <Icon name="chevron-right" {...props} />;
        const UserCheck = (props) => <Icon name="user-check" {...props} />;
        const PenTool = (props) => <Icon name="pen-tool" {...props} />;
        const ArrowLeft = (props) => <Icon name="arrow-left" {...props} />;
        const Settings = (props) => <Icon name="settings" {...props} />;
        const Search = (props) => <Icon name="search" {...props} />;
        const MapPin = (props) => <Icon name="map-pin" {...props} />;
        const Clock = (props) => <Icon name="clock" {...props} />;
        const XCircle = (props) => <Icon name="x-circle" {...props} />;
        const Trash2 = (props) => <Icon name="trash-2" {...props} />;
        const QrCode = (props) => <Icon name="qr-code" {...props} />;
        const LogOut = (props) => <Icon name="log-out" {...props} />;
        const Loader2 = (props) => <Icon name="loader-2" {...props} />;
        const Info = (props) => <Icon name="info" {...props} />;
        const PlusCircle = (props) => <Icon name="plus-circle" {...props} />;
        const AlertTriangle = (props) => <Icon name="alert-triangle" {...props} />;

        // --- Utils ---
        const formatTime = (timeValue) => {
            if (!timeValue) return "";
            try {
                const str = String(timeValue).trim();
                // "14:30:00" 또는 "14:30" 형태의 문자열에서 시:분만 추출
                const match = str.match(/(\d{1,2}):(\d{1,2})/);
                if (match) {
                    const h = match[1].padStart(2, '0');
                    const m = match[2].padStart(2, '0');
                    if (h === "00" && m === "00") return "";
                    return `${h}:${m}`;
                }

                // Date 객체인 경우
                const date = new Date(timeValue);
                if (isNaN(date.getTime())) return str;
                const hh = String(date.getHours()).padStart(2, '0');
                const mm = String(date.getMinutes()).padStart(2, '0');
                if (hh === "00" && mm === "00") return "";
                return `${hh}:${mm}`;
            } catch (e) {
                return String(timeValue);
            }
        };

        const formatDateTime = (dateValue) => {
            if (!dateValue) return "";
            try {
                const date = new Date(dateValue);
                if (isNaN(date.getTime())) return String(dateValue);

                return date.toLocaleString('ko-KR', {
                    year: 'numeric',
                    month: '2-digit',
                    day: '2-digit',
                    hour: '2-digit',
                    minute: '2-digit',
                    hour12: false,
                    timeZone: 'Asia/Seoul'
                }).replace(/\. /g, '-').replace(/\./g, '');
            } catch (e) {
                return String(dateValue);
            }
        };

        const formatDateForInput = (dateValue) => {
            if (!dateValue) return "";
            try {
                const str = String(dateValue).trim();
                
                // 1. "2026. 4. 14." 또는 "2026-04-14..." 형태에서 숫자만 추출
                const match = str.match(/(\d{4})[.-]\s*(\d{1,2})[.-]\s*(\d{1,2})/);
                if (match) {
                    const y = match[1];
                    const m = match[2].padStart(2, '0');
                    const d = match[3].padStart(2, '0');
                    return `${y}-${m}-${d}`;
                }
                
                // 2. Date 객체 또는 표준 문자열로 시도 (KST 보정 포함)
                const dObj = new Date(dateValue);
                if (!isNaN(dObj.getTime())) {
                    const yyyy = dObj.getFullYear();
                    const mm = String(dObj.getMonth() + 1).padStart(2, '0');
                    const dd = String(dObj.getDate()).padStart(2, '0');
                    return `${yyyy}-${mm}-${dd}`;
                }

                // 3. 마지막 수단: YYYY-MM-DD 형태인지 확인
                const simpleMatch = str.match(/(\d{4})-(\d{2})-(\d{2})/);
                if (simpleMatch) return simpleMatch[0];

                return "";
            } catch (e) {
                console.error("Date Input Parse Error:", e);
                return "";
            }
        };

        const formatDateKoreanLong = (dateValue) => {
            if (!dateValue) return "";
            try {
                const date = new Date(dateValue);
                if (isNaN(date.getTime())) return String(dateValue);

                const weekDays = ['일', '월', '화', '수', '목', '금', '토'];
                const dayOfWeek = weekDays[date.getDay()];

                return date.toLocaleDateString('ko-KR', {
                    year: 'numeric',
                    month: 'long',
                    day: 'numeric'
                }) + ` (${dayOfWeek})`;
            } catch (e) {
                return String(dateValue);
            }
        };

        const GAS_APP_URL = "https://script.google.com/macros/s/AKfycbzbLAYsi6x1TV-KxIFVspjqg3s0WIqQvdxgUhW1WYVnyrTrBD8VegswbcZBFPaTAnSP/exec";
        const ABSENCE_REASONS = ["출장", "연가", "병가", "조퇴", "병조퇴", "휴가", "기타"];

        const App = () => {
            const [view, setView] = useState('user');
            const [adminSubView, setAdminSubView] = useState('list');
            const [isLoading, setIsLoading] = useState(false);
            const [isPrinting, setIsPrinting] = useState(false);

            const [trainings, setTrainings] = useState([]);
            const [allStaff, setAllStaff] = useState([]);
            const [dashboardStats, setDashboardStats] = useState([]);
            const [selectedRegs, setSelectedRegs] = useState([]);

            const [step, setStep] = useState(1);
            const [selectedTraining, setSelectedTraining] = useState(null);
            const [searchName, setSearchName] = useState('');
            const [chosenStaff, setChosenStaff] = useState(null);
            const [regStatus, setRegStatus] = useState('attended');
            const [absenceReason, setAbsenceReason] = useState('');
            const [qrModalUrl, setQrModalUrl] = useState(null);
            const [pendingDeleteId, setPendingDeleteId] = useState(null);
            const [customAlert, setCustomAlert] = useState(null); // { title: '', message: '' }
            const [showOverwriteConfirm, setShowOverwriteConfirm] = useState(false);
            const [editId, setEditId] = useState(null); // 수정 중인 연수 ID

            const [newTraining, setNewTraining] = useState({
                title: '',
                location: '',
                date: new Date().toISOString().split('T')[0],
                startTime: '',
                endTime: '',
                targetParticipants: [] // List of staff names
            });

            const [isQrMode, setIsQrMode] = useState(new URLSearchParams(window.location.search).has('trainingId'));

            const [isManualMode, setIsManualMode] = useState(false);
            const [manualInfo, setManualInfo] = useState({ school: '하주초등학교', position: '', name: '' });

            const canvasRef = useRef(null);
            const [isDrawing, setIsDrawing] = useState(false);

            useEffect(() => { fetchInitialData(); }, []);

            // 전역 아이콘 동기화 (모든 상태 변화 시 실행)
            useLayoutEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [step, view, isManualMode, isLoading, trainings, qrModalUrl, customAlert, showOverwriteConfirm]);

            const fetchInitialData = async () => {
                if (!GAS_APP_URL) return;
                setIsLoading(true);
                try {
                    const res = await fetch(`${GAS_APP_URL}?action=getInitialData`);
                    const data = await res.json();
                    const loadedTrainings = data.trainings || [];
                    setTrainings(loadedTrainings);
                    setAllStaff(data.staff || []);

                    // URL 파라미터 확인 (QR 진입 시 자동 선택)
                    const urlParams = new URLSearchParams(window.location.search);
                    const trainingId = urlParams.get('trainingId');
                    
                    if (trainingId && loadedTrainings.length > 0) {
                        const target = loadedTrainings.find(t => String(t.id) === String(trainingId));
                        if (target) {
                            setSelectedTraining(target);
                            setStep(2);
                            fetchRegistrations(trainingId, target.title);
                        }
                    }
                } catch (err) { console.error(err); }
                setIsLoading(false);
            };

            const fetchDashboardStats = async () => {
                if (!GAS_APP_URL) return;
                setIsLoading(true);
                try {
                    const res = await fetch(`${GAS_APP_URL}?action=getDashboard`);
                    const data = await res.json();
                    setDashboardStats(data || []);
                } catch (err) { console.error(err); }
                setIsLoading(false);
            };

            const fetchRegistrations = async (trainingId, trainingTitle) => {
                if (!GAS_APP_URL) return [];
                setIsLoading(true);
                try {
                    const res = await fetch(`${GAS_APP_URL}?action=getRegistrations&trainingId=${trainingId}&trainingTitle=${encodeURIComponent(trainingTitle)}`);
                    const data = await res.json();
                    setSelectedRegs(data || []);
                    setIsLoading(false);
                    return data || [];
                } catch (err) { 
                    console.error(err); 
                    setIsLoading(false);
                    return [];
                }
            };

            const handleSaveTraining = async () => {
                if (!newTraining.title || !newTraining.date || !newTraining.startTime) return setCustomAlert({ title: '입력 오류', message: '제목, 날짜, 시작 시간은 필수입니다.' });

                const timeRegex = /^([01]\d|2[0-3]):([0-5]\d)$/;
                if (!timeRegex.test(newTraining.startTime) || (newTraining.endTime && !timeRegex.test(newTraining.endTime))) {
                    return setCustomAlert({ title: '형식 오류', message: '시간 형식을 HH:mm (24시간제)로 입력해주세요. (예: 14:30)' });
                }

                setIsLoading(true);
                try {
                    const params = {
                        action: editId ? 'updateTraining' : 'addTraining',
                        id: editId || Date.now(),
                        title: newTraining.title,
                        location: newTraining.location,
                        date: newTraining.date,
                        startTime: newTraining.startTime,
                        endTime: newTraining.endTime,
                        targetParticipants: newTraining.targetType === 'ALL' ? 'ALL' : JSON.stringify(newTraining.targetParticipants)
                    };
                    const res = await fetch(GAS_APP_URL, {
                        method: 'POST',
                        body: JSON.stringify(params)
                    });
                    const result = await res.json();
                    if (result.success) {
                        setCustomAlert({ title: '성공', message: editId ? '연수 정보가 수정되었습니다.' : '연수가 성공적으로 생성되었습니다.' });
                        setNewTraining({ title: '', location: '', date: new Date().toISOString().split('T')[0], startTime: '', endTime: '', targetType: 'ALL', targetParticipants: [] });
                        setEditId(null);
                        setAdminSubView('list');
                        fetchInitialData();
                    } else { setCustomAlert({ title: '저장 실패', message: result.error }); }
                } catch (err) { console.error(err); setCustomAlert({ title: '오류', message: '오류가 발생했습니다.' }); }
                setIsLoading(false);
            };

            const handleEditClick = (training) => {
                setEditId(training.id);
                // --- 데이터 무결성 보정 (다중 키 및 타입 캐스팅) ---
                const title = training.title || training['연수명'] || training['연수 프로그램명'] || '';
                const location = training.location || training['장소'] || '';
                const date = training.date || training['날짜'] || training['연수일자'] || '';
                const participantsRaw = training.targetParticipants || training['대상자'] || training['참석대상'] || '[]';
                let participantsList = [];
                try {
                   if (String(participantsRaw).trim().toUpperCase() === 'ALL') {
                       participantsList = allStaff.map(s => s.name);
                   } else {
                       participantsList = JSON.parse(participantsRaw);
                   }
                } catch(e) { participantsList = []; }

                setNewTraining({
                    title: title,
                    location: location,
                    date: formatDateForInput(date),
                    startTime: formatTime(training.startTime),
                    endTime: formatTime(training.endTime),
                    targetParticipants: participantsList
                });
                
                setAdminSubView('add');
            };

            const handleDeleteTraining = (id) => {
                setPendingDeleteId(id);
            };

            const confirmDelete = async () => {
                if (!pendingDeleteId) return;
                const id = pendingDeleteId;
                setPendingDeleteId(null);
                setIsLoading(true);
                try {
                    await fetch(GAS_APP_URL, {
                        method: 'POST',
                        body: JSON.stringify({ action: 'deleteTraining', id })
                    });
                    fetchInitialData();
                    if (adminSubView === 'dashboard') fetchDashboardStats();
                } catch (err) { console.error(err); }
                setIsLoading(false);
            };

            const handleRegister = async () => {
                const content = regStatus === 'attended' ? canvasRef.current.toDataURL('image/png') : absenceReason;
                setIsLoading(true);
                try {
                    const res = await fetch(GAS_APP_URL, {
                        method: 'POST',
                        body: JSON.stringify({
                            action: 'register',
                            trainingId: selectedTraining.id,
                            trainingTitle: selectedTraining.title,
                            name: chosenStaff.name,
                            position: chosenStaff.position,
                            grade: chosenStaff.grade,
                            status: regStatus,
                            content: content
                        })
                    });
                    const data = await res.json();
                    if (data.error) {
                        setCustomAlert({ title: '오류', message: data.error });
                    } else {
                        setStep(5);
                    }
                } catch (err) { 
                    setCustomAlert({ title: '오류', message: '등록 중 오류가 발생했습니다.' }); 
                }
                setIsLoading(false);
            };

            const handlePrint = (training) => {
                setIsLoading(true);
                fetchRegistrations(training.id, training.title).then((regs) => {
                    setIsLoading(false);
                    const printWindow = window.open('', '_blank');
                    if (!printWindow) return setCustomAlert({ title: '팝업 차단됨', message: '팝업 차단을 해제한 후 다시 시도해 주세요.' });

                    let displayList = [];
                    const isGlobal = String(training.targetParticipants || "").trim().toUpperCase() === "ALL";

                    if (isGlobal) {
                        displayList = allStaff.map(s => {
                            const reg = (regs || []).find(r => r.name === s.name);
                            return reg || { name: s.name, position: s.position, grade: s.grade, status: 'none', content: '' };
                        });
                    } else {
                        try {
                            const targetNames = JSON.parse(training.targetParticipants || "[]");
                            displayList = targetNames.map(name => {
                                const reg = (regs || []).find(r => r.name === name);
                                const staff = allStaff.find(s => s.name === name);
                                return reg || { name, position: staff?.position || '', grade: staff?.grade || '', status: 'none', content: '' };
                            });
                        } catch (e) { displayList = []; }
                        }
                        
                        const isDualColumn = displayList.length > 20;
                        const half = isDualColumn ? Math.ceil(displayList.length / 2) : displayList.length;
                        const leftCol = displayList.slice(0, half);
                        const rightCol = displayList.slice(half);

                        const renderTable = (list, startIdx, isDual) => `
                            <table style="width: 100%; table-layout: fixed;">
                                <thead>
                                    <tr>
                                        <th style="width: 25px;">No.</th>
                                        <th style="width: ${isDual ? '75px' : '120px'};">소속</th>
                                        <th style="width: ${isDual ? '55px' : '80px'};">직위</th>
                                        <th style="width: ${isDual ? '65px' : '100px'};">성명</th>
                                        <th style="width: ${isDual ? '100px' : '150px'};">서명</th>
                                        <th style="width: auto;">비고</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${list.map((reg, idx) => {
                                        const isSigned = reg.status === 'attended' && reg.content;
                                        const isAbsent = reg.status === 'absent';
                                        const school = reg.grade && reg.grade.includes('초') ? reg.grade : (reg.name ? '하주초등학교' : '');
                                        return `
                                        <tr style="height: 22px;">
                                            <td>${startIdx + idx + 1}</td>
                                            <td>${school}</td>
                                            <td>${reg.position || ''}</td>
                                            <td><strong>${reg.name || ''}</strong></td>
                                            <td style="padding: 0;">
                                                ${isSigned ? (reg.content.startsWith('http') ? `<img src="${reg.content}" style="height: 20px; width: auto; max-width: 100%; object-fit: contain; margin: 0 auto;" />` : '서명완료') : ''}
                                                ${isAbsent ? '-' : ''}
                                            </td>
                                            <td style="text-align: left; padding-left: 3px;">${isAbsent ? (reg.content || '') : ''}</td>
                                        </tr>
                                        `;
                                    }).join('')}
                                </tbody>
                            </table>
                        `;

                    const html = `
                        <html>
                        <head>
                            <title>${training.title} 연수 등록부</title>
                            <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
                            <style>
                                @page { size: A4; margin: 5mm; }
                                body { font-family: 'Noto Sans KR', sans-serif; padding: 0; margin: 0; }
                                .container { width: 100%; border: 1pt solid black; padding: 3mm 4mm; box-sizing: border-box; min-height: 285mm; display: flex; flex-direction: column; align-items: center; }
                                .title-section { text-align: center; margin-bottom: 5px; width: 100%; }
                                h1 { font-size: 18pt; font-weight: bold; text-decoration: underline; margin: 0; }
                                .header-right { text-align: right; margin-bottom: 5px; width: 100%; }
                                .school-name { font-size: 11pt; font-weight: bold; margin-bottom: 1px; }
                                .training-info { font-size: 8.2pt; color: #333; }
                                .columns { display: flex; gap: 0; width: 100%; flex: 1; min-height: 0; }
                                .column { flex: 0 0 50%; width: 50%; border-right: 0.5pt solid #eee; box-sizing: border-box; }
                                .column:last-child { border-right: none; }
                                table { border-collapse: collapse; width: 100%; font-size: 7.5px; table-layout: fixed; }
                                th, td { border: 1pt solid black; padding: 1.2px 1px; text-align: center; overflow: hidden; white-space: nowrap; }
                                th { background-color: #f3f3f3; font-weight: bold; }
                                td { vertical-align: middle; }
                                img { height: 16px; width: auto; max-width: 100%; display: block; margin: 0 auto; }
                                .footer { margin-top: 2px; width: 100%; text-align: right; font-weight: bold; font-size: 8pt; }
                             </style>
                        </head>
                        <body>
                            <div class="container">
                                <div class="title-section">
                                    <h1>${training.title} 연수 등록부</h1>
                                </div>
                                <div class="header-right">
                                    <div class="school-name">하주초등학교</div>
                                    <div class="training-info">

                                        <div className="space-y-6 md:space-y-8 animate-in text-center flex-1 flex flex-col py-4">
                                            <div className="space-y-2">
                                                <h2 className="text-3xl font-black text-slate-800 tracking-tight">
                                                    {regStatus === 'attended' ? '서명' : '사유 선택'}
                                                </h2>
                                                <p className="text-slate-400 font-medium">
                                                    {regStatus === 'attended' ? '아래 공간에 서명해 주세요' : '불참하시는 사유를 선택해 주세요'}
                                                </p>
                                            </div>

                                            {regStatus === 'attended' ? (
                                                <div className="space-y-6 flex-1 flex flex-col">
                                                    <div className="canvas-container flex-1 bg-white border-4 border-dashed border-slate-100 rounded-[2rem] relative shadow-inner overflow-hidden min-h-[220px]">
                                                        <canvas ref={canvasRef} width={1000} height={500}
                                                            onMouseDown={startDrawing} onMouseMove={draw} onMouseUp={() => setIsDrawing(false)} onMouseLeave={() => setIsDrawing(false)}
                                                            onTouchStart={startDrawing} onTouchMove={draw} onTouchEnd={() => setIsDrawing(false)}
                                                            className="absolute inset-0 w-full h-full cursor-crosshair bg-white" title="Signature Area" />
                                                    </div>
                                                    <div className="flex justify-between items-center px-2">
                                                        <button onClick={() => { const ctx = canvasRef.current.getContext('2d'); ctx.clearRect(0, 0, 1000, 500); ctx.beginPath(); }}
                                                            className="text-xs font-black text-rose-400 hover:text-rose-600 uppercase tracking-widest flex items-center gap-1">
                                                            <Trash2 size={14} /> 지우기
                                                        </button>
                                                        <span className="text-[10px] font-black text-slate-300 italic">서명 후 [등록하기] 버튼을 눌러주세요</span>
                                                    </div>
                                                </div>
                                            ) : (
                                                <div className="grid grid-cols-2 gap-3 flex-1">
                                                    {ABSENCE_REASONS.map(r => (
                                                        <button key={r} onClick={() => setAbsenceReason(r)}
                                                            className={`p-4 rounded-2xl border-2 transition-all font-black ${absenceReason === r ? 'border-indigo-600 bg-indigo-50 text-indigo-700 shadow-lg' : 'border-slate-50 text-slate-300 bg-white hover:bg-slate-50 hover:text-slate-500'}`}>
                                                            {r}
                                                        </button>
                                                    ))}
                                                </div>
                                            )}

                                            <button disabled={isLoading || (regStatus === 'absent' && !absenceReason)} onClick={handleRegister}
                                                className="w-full bg-indigo-600 text-white font-black py-5 rounded-[1.8rem] hover:bg-indigo-700 shadow-xl shadow-indigo-200 transition-all text-xl disabled:bg-slate-200 disabled:shadow-none flex items-center justify-center gap-3">
                                                {isLoading ? <Loader2 className="animate-spin" /> : <CheckCircle2 size={24} />}
                                                등록하기
                                            </button>
                                        </div>
                                    )}

                                    {step === 5 && (
                                        <div className="text-center py-10 space-y-10 animate-in flex flex-col items-center justify-center flex-1">
                                            <div className="relative">
                                                <div className="absolute inset-0 bg-emerald-400 blur-2xl opacity-20 animate-pulse"></div>
                                                <div className="relative w-28 h-28 bg-emerald-50 text-emerald-500 rounded-full flex items-center justify-center border-4 border-white shadow-2xl">
                                                    <CheckCircle2 size={64} strokeWidth={2.5} />
                                                </div>
                                            </div>
                                            <div className="space-y-4">
                                                <h2 className="text-4xl font-black text-slate-800 tracking-tighter">등록이 완료되었습니다!</h2>
                                                <p className="text-slate-400 font-bold px-4 leading-relaxed">성실하게 연수에 참여해 주셔서 감사합니다.<br />이제 창을 닫으셔도 좋습니다.</p>
                                            </div>
                                            <div className="w-full max-w-xs pt-4">
                                                <button onClick={() => { setStep(1); setSearchName(''); setAbsenceReason(''); setSelectedTraining(null); }}
                                                    className="w-full bg-slate-900 text-white px-8 py-5 rounded-[1.5rem] font-black text-lg btn-hover">처음으로</button>
                                            </div>
                                        </div>
                                    )}
                                </div>
                                <p className="text-center text-[10px] text-slate-300 font-black mt-8 tracking-[0.3em] uppercase opacity-50">School Training Management System v2.0</p>
                            </div>
                        )}
                    </main>

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
