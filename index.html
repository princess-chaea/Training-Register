<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>학교 연수 등록 시스템</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <style>
        body {
            font-family: 'Inter', 'Noto Sans KR', sans-serif;
            overflow-x: hidden;
        }

        .font-outfit {
            font-family: 'Outfit', sans-serif;
        }

        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .animate-in {
            animation: animate-in 0.5s ease-out;
        }

        @keyframes animate-in {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .canvas-container {
            touch-action: none;
            position: relative;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #e2e8f0;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #cbd5e1;
        }

        .btn-hover {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-hover:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .btn-hover:active {
            transform: translateY(0);
        }
        @keyframes loading-bar-anim {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(250%); }
        }

        .loading-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: rgba(226, 232, 240, 0.3);
            overflow: hidden;
            z-index: 9999;
        }

        .loading-bar::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 40%;
            height: 100%;
            background: linear-gradient(90deg, #4f46e5, #818cf8, #4f46e5);
            animation: loading-bar-anim 1.2s infinite ease-in-out;
        }
    </style>
</head>

<body class="bg-[#f8fafc]">
    <div id="root">
        <!-- Pre-loader: App booting... -->
        <div class="fixed inset-0 flex items-center justify-center bg-white/50 backdrop-blur-sm transition-opacity duration-500">
            <div class="w-24 h-1 bg-slate-100 rounded-full overflow-hidden relative">
                <div class="absolute inset-0 bg-indigo-600 w-1/2 animate-[loading-bar-anim_1.2s_infinite_ease-in-out]"></div>
            </div>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useRef, useEffect, useMemo } = React;

        // --- Lucide React Helper ---
        const Icon = ({ name, size = 24, className = "", strokeWidth = 2 }) => {
            const containerRef = useRef(null);

            useEffect(() => {
                if (containerRef.current && window.lucide) {
                    // React와 Lucide의 DOM 조작 충돌을 방지하기 위해 컨테이너 내부를 수동 관리합니다.
                    containerRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
                    window.lucide.createIcons({
                        targets: [containerRef.current.firstChild],
                        attrs: {
                            class: className,
                            width: size,
                            height: size,
                            'stroke-width': strokeWidth
                        }
                    });
                }
                return () => {
                    if (containerRef.current) containerRef.current.innerHTML = '';
                };
            }, [name, size, className, strokeWidth]);

            return <span ref={containerRef} className="inline-flex items-center justify-center leading-none"></span>;
        };

        const Users = (props) => <Icon name="users" {...props} />;
        const Plus = (props) => <Icon name="plus" {...props} />;
        const Calendar = (props) => <Icon name="calendar" {...props} />;
        const Download = (props) => <Icon name="download" {...props} />;
        const Printer = (props) => <Icon name="printer" {...props} />;
        const CheckCircle2 = (props) => <Icon name="check-circle-2" {...props} />;
        const ChevronRight = (props) => <Icon name="chevron-right" {...props} />;
        const UserCheck = (props) => <Icon name="user-check" {...props} />;
        const PenTool = (props) => <Icon name="pen-tool" {...props} />;
        const ArrowLeft = (props) => <Icon name="arrow-left" {...props} />;
        const Settings = (props) => <Icon name="settings" {...props} />;
        const Search = (props) => <Icon name="search" {...props} />;
        const MapPin = (props) => <Icon name="map-pin" {...props} />;
        const Clock = (props) => <Icon name="clock" {...props} />;
        const XCircle = (props) => <Icon name="x-circle" {...props} />;
        const Trash2 = (props) => <Icon name="trash-2" {...props} />;
        const QrCode = (props) => <Icon name="qr-code" {...props} />;
        const LogOut = (props) => <Icon name="log-out" {...props} />;
        const Loader2 = (props) => <Icon name="loader-2" {...props} />;
        const Info = (props) => <Icon name="info" {...props} />;

        // --- Utils ---
        const formatTime = (timeValue) => {
            if (!timeValue) return "";
            try {
                const str = String(timeValue).trim();
                // "14:30:00" 또는 "14:30" 형태의 문자열에서 시:분만 추출
                const match = str.match(/(\d{1,2}):(\d{1,2})/);
                if (match) {
                    const h = match[1].padStart(2, '0');
                    const m = match[2].padStart(2, '0');
                    if (h === "00" && m === "00") return "";
                    return `${h}:${m}`;
                }

                // Date 객체인 경우
                const date = new Date(timeValue);
                if (isNaN(date.getTime())) return str;
                const hh = String(date.getHours()).padStart(2, '0');
                const mm = String(date.getMinutes()).padStart(2, '0');
                if (hh === "00" && mm === "00") return "";
                return `${hh}:${mm}`;
            } catch (e) {
                return String(timeValue);
            }
        };

        const formatDateTime = (dateValue) => {
            if (!dateValue) return "";
            try {
                const date = new Date(dateValue);
                if (isNaN(date.getTime())) return String(dateValue);

                return date.toLocaleString('ko-KR', {
                    year: 'numeric',
                    month: '2-digit',
                    day: '2-digit',
                    hour: '2-digit',
                    minute: '2-digit',
                    hour12: false,
                    timeZone: 'Asia/Seoul'
                }).replace(/\. /g, '-').replace(/\./g, '');
            } catch (e) {
                return String(dateValue);
            }
        };

        const formatDateForInput = (dateValue) => {
            if (!dateValue) return "";
            try {
                const str = String(dateValue).trim();
                // "2026-04-14..." 또는 "2026. 4. 14." 형태에서 숫자만 추출
                const match = str.match(/(\d{4})[.-]\s*(\d{1,2})[.-]\s*(\d{1,2})/);
                if (match) {
                    const y = match[1];
                    const m = match[2].padStart(2, '0');
                    const d = match[3].padStart(2, '0');
                    return `${y}-${m}-${d}`;
                }
                
                const dObj = new Date(dateValue);
                if (isNaN(dObj.getTime())) return str.split('T')[0] || "";
                
                // ISO 문자열에서 직접 추출 (지연 발생 없는 안전한 방식)
                const yyyy = dObj.getFullYear();
                const mm = String(dObj.getMonth() + 1).padStart(2, '0');
                const dd = String(dObj.getDate()).padStart(2, '0');
                return `${yyyy}-${mm}-${dd}`;
            } catch (e) {
                return "";
            }
        };

        const formatDateKoreanLong = (dateValue) => {
            if (!dateValue) return "";
            try {
                const date = new Date(dateValue);
                if (isNaN(date.getTime())) return String(dateValue);

                const weekDays = ['일', '월', '화', '수', '목', '금', '토'];
                const dayOfWeek = weekDays[date.getDay()];

                return date.toLocaleDateString('ko-KR', {
                    year: 'numeric',
                    month: 'long',
                    day: 'numeric'
                }) + ` (${dayOfWeek})`;
            } catch (e) {
                return String(dateValue);
            }
        };

        const GAS_APP_URL = "https://script.google.com/macros/s/AKfycbzbLAYsi6x1TV-KxIFVspjqg3s0WIqQvdxgUhW1WYVnyrTrBD8VegswbcZBFPaTAnSP/exec";
        const ABSENCE_REASONS = ["출장", "연가", "병가", "조퇴", "병조퇴", "휴가", "기타"];

        const App = () => {
            const [view, setView] = useState('user');
            const [adminSubView, setAdminSubView] = useState('list');
            const [isLoading, setIsLoading] = useState(false);
            const [isPrinting, setIsPrinting] = useState(false);

            const [trainings, setTrainings] = useState([]);
            const [allStaff, setAllStaff] = useState([]);
            const [dashboardStats, setDashboardStats] = useState([]);
            const [selectedRegs, setSelectedRegs] = useState([]);

            const [step, setStep] = useState(1);
            const [selectedTraining, setSelectedTraining] = useState(null);
            const [searchName, setSearchName] = useState('');
            const [chosenStaff, setChosenStaff] = useState(null);
            const [regStatus, setRegStatus] = useState('attended');
            const [absenceReason, setAbsenceReason] = useState('');
            const [qrModalUrl, setQrModalUrl] = useState(null);
            const [pendingDeleteId, setPendingDeleteId] = useState(null);
            const [customAlert, setCustomAlert] = useState(null); // { title: '', message: '' }
            const [showOverwriteConfirm, setShowOverwriteConfirm] = useState(false);
            const [editId, setEditId] = useState(null); // 수정 중인 연수 ID

            const [newTraining, setNewTraining] = useState({
                title: '',
                location: '',
                date: new Date().toISOString().split('T')[0],
                startTime: '',
                endTime: '',
                targetType: 'ALL',
                targetParticipants: [] // List of staff names or objects
            });

            const canvasRef = useRef(null);
            const [isDrawing, setIsDrawing] = useState(false);

            useEffect(() => { fetchInitialData(); }, []);

            const fetchInitialData = async () => {
                if (!GAS_APP_URL) return;
                setIsLoading(true);
                try {
                    const res = await fetch(`${GAS_APP_URL}?action=getInitialData`);
                    const data = await res.json();
                    const loadedTrainings = data.trainings || [];
                    setTrainings(loadedTrainings);
                    setAllStaff(data.staff || []);

                    // URL 파라미터 확인 (QR 진입 시 자동 선택)
                    const urlParams = new URLSearchParams(window.location.search);
                    const trainingId = urlParams.get('trainingId');
                    if (trainingId && loadedTrainings.length > 0) {
                        const target = loadedTrainings.find(t => String(t.id) === String(trainingId));
                        if (target) {
                            setSelectedTraining(target);
                            setStep(2);
                            fetchRegistrations(trainingId);
                        }
                    }
                } catch (err) { console.error(err); }
                setIsLoading(false);
            };

            const fetchDashboardStats = async () => {
                if (!GAS_APP_URL) return;
                setIsLoading(true);
                try {
                    const res = await fetch(`${GAS_APP_URL}?action=getDashboard`);
                    const data = await res.json();
                    setDashboardStats(data || []);
                } catch (err) { console.error(err); }
                setIsLoading(false);
            };

            const fetchRegistrations = async (trainingId) => {
                if (!GAS_APP_URL) return [];
                setIsLoading(true);
                try {
                    const res = await fetch(`${GAS_APP_URL}?action=getRegistrations&trainingId=${trainingId}`);
                    const data = await res.json();
                    setSelectedRegs(data || []);
                    setIsLoading(false);
                    return data || [];
                } catch (err) { 
                    console.error(err); 
                    setIsLoading(false);
                    return [];
                }
            };

            const handleSaveTraining = async () => {
                if (!newTraining.title || !newTraining.date || !newTraining.startTime) return setCustomAlert({ title: '입력 오류', message: '제목, 날짜, 시작 시간은 필수입니다.' });

                const timeRegex = /^([01]\d|2[0-3]):([0-5]\d)$/;
                if (!timeRegex.test(newTraining.startTime) || (newTraining.endTime && !timeRegex.test(newTraining.endTime))) {
                    return setCustomAlert({ title: '형식 오류', message: '시간 형식을 HH:mm (24시간제)로 입력해주세요. (예: 14:30)' });
                }

                setIsLoading(true);
                try {
                    const params = {
                        action: editId ? 'updateTraining' : 'addTraining',
                        id: editId || Date.now(),
                        title: newTraining.title,
                        location: newTraining.location,
                        date: newTraining.date,
                        startTime: newTraining.startTime,
                        endTime: newTraining.endTime,
                        targetParticipants: newTraining.targetType === 'ALL' ? 'ALL' : JSON.stringify(newTraining.targetParticipants)
                    };
                    const res = await fetch(GAS_APP_URL, {
                        method: 'POST',
                        body: JSON.stringify(params)
                    });
                    const result = await res.json();
                    if (result.success) {
                        setCustomAlert({ title: '성공', message: editId ? '연수 정보가 수정되었습니다.' : '연수가 성공적으로 생성되었습니다.' });
                        setNewTraining({ title: '', location: '', date: new Date().toISOString().split('T')[0], startTime: '', endTime: '', targetType: 'ALL', targetParticipants: [] });
                        setEditId(null);
                        setAdminSubView('list');
                        fetchInitialData();
                    } else { setCustomAlert({ title: '저장 실패', message: result.error }); }
                } catch (err) { console.error(err); setCustomAlert({ title: '오류', message: '오류가 발생했습니다.' }); }
                setIsLoading(false);
            };

            const handleEditClick = (training) => {
                setEditId(training.id);
                
                // --- 데이터 무결성 보정 (다중 키 확인) ---
                const title = training.title || training['연수명'] || '';
                const location = training.location || training['장소'] || '';
                const date = training.date || training['날짜'] || training['연수일자'] || '';
                const startTime = training.startTime || training['시작시간'] || training['시작 시간'] || '';
                const endTime = training.endTime || training['종료시간'] || training['종료 시간'] || '';
                const participants = training.targetParticipants || training['대상자'] || training['참석대상'] || '';

                const isAll = String(participants || "").trim().toUpperCase() === 'ALL';
                
                setNewTraining({
                    title: title,
                    location: location,
                    date: formatDateForInput(date),
                    startTime: formatTime(startTime),
                    endTime: formatTime(endTime),
                    targetType: isAll ? 'ALL' : 'SELECT',
                    targetParticipants: isAll ? [] : JSON.parse(participants || '[]')
                });
                setAdminSubView('add');
            };

            const handleDeleteTraining = (id) => {
                setPendingDeleteId(id);
            };

            const confirmDelete = async () => {
                if (!pendingDeleteId) return;
                const id = pendingDeleteId;
                setPendingDeleteId(null);
                setIsLoading(true);
                try {
                    await fetch(GAS_APP_URL, {
                        method: 'POST',
                        body: JSON.stringify({ action: 'deleteTraining', id })
                    });
                    fetchInitialData();
                    if (adminSubView === 'dashboard') fetchDashboardStats();
                } catch (err) { console.error(err); }
                setIsLoading(false);
            };

            const handleRegister = async () => {
                const content = regStatus === 'attended' ? canvasRef.current.toDataURL('image/png') : absenceReason;
                setIsLoading(true);
                try {
                    const res = await fetch(GAS_APP_URL, {
                        method: 'POST',
                        body: JSON.stringify({
                            action: 'register',
                            trainingId: selectedTraining.id,
                            trainingTitle: selectedTraining.title,
                            name: chosenStaff.name,
                            position: chosenStaff.position,
                            grade: chosenStaff.grade,
                            status: regStatus,
                            content: content
                        })
                    });
                    const data = await res.json();
                    if (data.error) {
                        setCustomAlert({ title: '오류', message: data.error });
                    } else {
                        setStep(5);
                    }
                } catch (err) { 
                    setCustomAlert({ title: '오류', message: '등록 중 오류가 발생했습니다.' }); 
                }
                setIsLoading(false);
            };

            const handlePrint = (training) => {
                setIsLoading(true);
                fetchRegistrations(training.id).then((regs) => {
                    setIsLoading(false);
                    const printWindow = window.open('', '_blank');
                    if (!printWindow) {
                        return setCustomAlert({ title: '팝업 차단됨', message: '브라우저의 팝업 차단을 해제한 후 다시 시도해 주세요.' });
                    }

                    let displayList = [];
                    if (training.targetParticipants === "ALL") {
                        displayList = allStaff.map(s => {
                            const reg = (regs || []).find(r => r.name === s.name);
                            return reg || { name: s.name, position: s.position, grade: s.grade, status: 'none', content: '' };
                        });
                    } else {
                        try {
                            const targetNames = JSON.parse(training.targetParticipants || "[]");
                            displayList = targetNames.map(name => {
                                const reg = (regs || []).find(r => r.name === name);
                                const staff = allStaff.find(s => s.name === name);
                                return reg || { name, position: staff?.position || '', grade: staff?.grade || '', status: 'none', content: '' };
                            });
                        } catch (e) { displayList = []; }
                    }

                    const displayListWithEmpties = [...displayList];
                    // 전체 교직원이면 빈 행을 최소화하여 1페이지에 맞춤
                    const minRows = training.targetParticipants === "ALL" ? 0 : 20; 
                    const totalNeeded = Math.max(minRows, displayList.length);
                    const emptyCount = totalNeeded - displayList.length;
                    
                    for(let i=0; i<emptyCount; i++) {
                        displayListWithEmpties.push({ name: '', position: '', grade: '', status: 'none', content: '' });
                    }

                    // 2단 분리를 위해 리스트를 절반으로 나눔
                    const half = Math.ceil(displayListWithEmpties.length / 2);
                    const leftCol = displayListWithEmpties.slice(0, half);
                    const rightCol = displayListWithEmpties.slice(half);

                    const renderTable = (list, startIdx) => `
                        <table>
                            <thead>
                                <tr>
                                    <th style="width: 70px;">학반(직위)</th>
                                    <th style="width: 80px;">성명</th>
                                    <th style="width: 100px;">서명</th>
                                    <th>비고</th>
                                </tr>
                            </thead>
                             <tbody>
                                ${list.map((reg, i) => `
                                    <tr style="height: 30px;">
                                        <td>${reg.grade || reg.position || ''}</td>
                                        <td><strong>${reg.name || ''}</strong></td>
                                        <td>
                                            ${reg.status === 'attended' ? (
                                                reg.content && reg.content.startsWith('http') ? 
                                                `<img src="${reg.content}" onerror="this.style.display='none';this.parentElement.innerHTML='서명완료';">` : '서명완료'
                                            ) : (reg.status === 'absent' ? '-' : '')}
                                        </td>
                                        <td>${reg.status === 'absent' ? (reg.content || '') : ''}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    `;

                    const html = `
                        <html>
                        <head>
                            <title>${training.title} 연수 등록부</title>
                            <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
                             <style>
                                @page { size: A4; margin: 10mm; }
                                body { font-family: 'Noto Sans KR', sans-serif; padding: 5px; margin: 0; }
                                .container { width: 100%; border: 1.5pt solid black; padding: 15px; box-sizing: border-box; }
                                h1 { text-align: center; text-decoration: underline; margin-top: 0; margin-bottom: 15px; font-size: 18pt; }
                                .header-info { text-align: right; margin-bottom: 10px; }
                                .school-name { font-size: 12pt; font-weight: bold; margin-bottom: 2px; }
                                .training-info { font-size: 9pt; color: #333; }
                                .columns { display: flex; gap: 10px; align-items: flex-start; }
                                .column { flex: 1; }
                                table { border-collapse: collapse; width: 100%; font-size: 9px; table-layout: fixed; }
                                th, td { border: 1pt solid black; padding: 3px 2px; text-align: center; overflow: hidden; white-space: nowrap; }
                                th { background-color: #f8fafc; font-weight: bold; }
                                img { height: 24px; width: auto; max-width: 100%; display: block; margin: 0 auto; filter: contrast(1.2); }
                                .footer { margin-top: 15px; text-align: right; font-weight: bold; font-size: 11pt; }
                                .timestamp { margin-top: 4px; text-align: right; font-size: 8px; color: #888; }
                                @media print { .no-print { display: none; } }
                            </style>
                        </head>
                        <body>
                            <div class="container">
                                <h1>${training.title} 연수 등록부</h1>
                                <div class="header-info">
                                    <div class="school-name">하주초등학교</div>
                                    <div class="training-info">
                                        장소: ${training.location} | 일시: ${formatDateKoreanLong(training.date)} ${formatTime(training.startTime)}${formatTime(training.endTime) ? ` ~ ${formatTime(training.endTime)}` : ' ~'}
                                    </div>
                                </div>
                                <div class="columns">
                                    <div class="column">${renderTable(leftCol, 0)}</div>
                                    <div class="column">${renderTable(rightCol, half)}</div>
                                </div>
                                <p class="footer">위와 같이 연수에 참석하였음을 확인합니다.</p>
                                <p class="timestamp">출력일시: ${formatDateTime(new Date())}</p>
                            </div>
                            <script>window.onload = () => { setTimeout(() => { window.print(); window.close(); }, 800); };<\/script>
                        </body>
                        </html>
                    `;
                    printWindow.document.write(html);
                    printWindow.document.close();
                });
            };

            const exportToExcel = (training) => {
                setIsLoading(true);
                fetchRegistrations(training.id).then((regs) => {
                    setIsLoading(false);
                    
                    let displayList = [];
                    if (training.targetParticipants === "ALL") {
                        displayList = allStaff.map(s => {
                            const reg = (regs || []).find(r => r.name === s.name);
                            return reg || { name: s.name, position: s.position, grade: s.grade, status: 'none', content: '' };
                        });

                    const excelTemplate = `

                        <head>

                const rect = canvasRef.current.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                
                // 캔버스 실제 크기(1000x500) 대비 뷰포트 크기의 비율 계산
                const scaleX = canvasRef.current.width / rect.width;
                const scaleY = canvasRef.current.height / rect.height;
                
                return { 
                    x: (clientX - rect.left) * scaleX, 
                    y: (clientY - rect.top) * scaleY 
                };
            };

            const startDrawing = (e) => {
                setIsDrawing(true);

                ctx.strokeStyle = '#1e293b';
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.beginPath();
                ctx.moveTo(pos.x, pos.y);
            };

                canvasRef.current.getContext('2d').lineTo(pos.x, pos.y);

                                                        </td>

                                            </>

                                                                >
                                                                    <div className={`w-3 h-3 rounded-full border ${newTraining.targetParticipants.includes(s.name) ? 'bg-indigo-500 border-indigo-500' : 'border-slate-200'}`}></div>
                                                                    {s.name} <span className="text-[9px] opacity-60 font-medium">({s.position})</span>
                                                                </button>
                                                            ))}
                                                        </div>
                                                        <p className="text-[10px] text-slate-400 font-bold ml-1">선택된 인원: <span className="text-indigo-600">{newTraining.targetParticipants.length}</span>명</p>
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                        <button onClick={handleSaveTraining} className="w-full bg-indigo-600 text-white font-black py-5 rounded-[1.5rem] hover:bg-indigo-700 shadow-lg shadow-indigo-100 transition-all text-lg">
                                            {editId ? '연수 정보 수정하기' : '연수 등록부 생성하기'}
                                        </button>
                                    </div>
                                )}

                                {adminSubView === 'list' && (
                                    <div className="grid grid-cols-1 gap-4">
                                        {trainings.map(t => (
                                            <div key={t.id} className="bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm flex flex-col md:flex-row md:items-center justify-between gap-6 hover:shadow-md transition-shadow">
                                                <div className="flex-1">
                                                    <div className="flex items-center gap-2 mb-1">
                                                        <span className="px-2.5 py-1 bg-indigo-50 text-indigo-600 text-[10px] font-black rounded-lg uppercase tracking-wide">AVAILABLE</span>
                                                        <span className="text-xs text-slate-400 font-bold">{t.date || new Date().toLocaleDateString()}</span>
                                                    </div>
                                                    <h3 className="font-black text-xl text-slate-800">{t.title}</h3>
                                                    <div className="flex gap-4 text-sm text-slate-400 font-semibold mt-1">
                                                        <span className="flex items-center gap-1.5"><MapPin size={14} className="text-slate-300" /> {t.location}</span>
                                                        <span className="flex items-center gap-1.5"><Clock size={14} className="text-slate-300" /> {formatTime(t.startTime)}{formatTime(t.endTime) ? ` ~ ${formatTime(t.endTime)}` : ' ~'}</span>
                                                    </div>
                                                </div>
                                                <div className="flex items-center gap-2 flex-wrap md:flex-nowrap">
                                                    <button onClick={() => handleEditClick(t)} className="flex items-center gap-2 px-4 py-2.5 bg-slate-50 text-indigo-600 rounded-2xl hover:bg-indigo-50 transition-all border border-slate-100 group" title="수정">
                                                        <Settings size={18} />
                                                        <span className="text-xs font-bold">수정</span>
                                                    </button>
                                                    <button onClick={() => setQrModalUrl(`${window.location.href.split('?')[0]}?trainingId=${t.id}`)} className="flex items-center gap-2 px-4 py-2.5 bg-slate-50 text-slate-600 rounded-2xl hover:bg-slate-100 transition-all border border-slate-100 group" title="QR 생성">
                                                        <QrCode size={18} />
                                                        <span className="text-xs font-bold">QR 코드</span>
                                                    </button>
                                                    <button onClick={() => handlePrint(t)} className="flex items-center gap-2 px-4 py-2.5 bg-indigo-50 text-indigo-600 rounded-2xl hover:bg-indigo-100 transition-all border border-indigo-100 group" title="인쇄">
                                                        <Printer size={18} />
                                                        <span className="text-xs font-bold">인쇄하기</span>
                                                    </button>
                                                    <button onClick={() => exportToExcel(t)} className="flex items-center gap-2 px-4 py-2.5 bg-emerald-50 text-emerald-600 rounded-2xl hover:bg-emerald-100 transition-all border border-emerald-100 group" title="엑셀 저장">
                                                        <Download size={18} />
                                                        <span className="text-xs font-bold">엑셀 저장</span>
                                                    </button>
                                                    <button onClick={() => handleDeleteTraining(t.id)} className="flex items-center gap-2 px-4 py-2.5 bg-rose-50 text-rose-500 rounded-2xl hover:bg-rose-100 transition-all border border-rose-100 group" title="삭제">
                                                        <Trash2 size={18} />
                                                        <span className="text-xs font-bold">삭제</span>
                                                    </button>
                                                </div>
                                            </div>
                                        ))}
                                        {trainings.length === 0 && <div className="text-center py-20 text-slate-400 font-bold">등록된 연수가 없습니다.</div>}
                                    </div>
                                )}

                                {adminSubView === 'dashboard' && (
                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                        {dashboardStats.map(stat => (
                                            <div key={stat.id} className="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm space-y-4">
                                                <h4 className="font-bold text-slate-800 truncate">{stat.title}</h4>
                                                <div className="flex justify-between items-end">
                                                    <div>
                                                        <span className="text-3xl font-black text-indigo-600">{stat.attended}</span>
                                                        <span className="text-slate-300 text-sm font-bold ml-1">/ {stat.total}</span>
                                                    </div>
                                                    <span className="text-xs font-bold text-emerald-500 bg-emerald-50 px-2 py-1 rounded-lg">참석률 {Math.round((stat.attended / (stat.total || 1)) * 100)}%</span>
                                                </div>
                                                <div className="h-2 w-full bg-slate-100 rounded-full overflow-hidden flex">
                                                    <div className="bg-indigo-500 h-full" style={{ width: `${(stat.attended / (stat.total || 1)) * 100}%` }}></div>
                                                    <div className="bg-rose-400 h-full" style={{ width: `${(stat.absent / (stat.total || 1)) * 100}%` }}></div>
                                                </div>
                                                <div className="flex justify-between text-[10px] font-bold uppercase tracking-tight">
                                                    <span className="text-indigo-500">참석: {stat.attended}</span>
                                                    <span className="text-rose-400">불참: {stat.absent}</span>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        ) : (
                            <div className="max-w-xl mx-auto py-4">
                                <div className="bg-white p-8 md:p-12 rounded-[2.5rem] shadow-2xl shadow-indigo-100 border border-slate-50 min-h-[500px] flex flex-col relative overflow-hidden">
                                    <div className="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-indigo-500 via-purple-500 to-indigo-500"></div>

                                    {step < 5 && (
                                        <div className="flex justify-between items-center mb-8">
                                            <div className="flex gap-2">
                                                {[1, 2, 3, 4].map(i => (
                                                    <div key={i} className={`h-1.5 rounded-full transition-all duration-300 ${step >= i ? 'w-8 bg-indigo-600' : 'w-2 bg-slate-100'}`}></div>
                                                ))}
                                            </div>
                                            <span className="text-[10px] font-black text-indigo-300 uppercase tracking-widest">STEP {step} / 4</span>
                                        </div>
                                    )}

                                    {step === 1 && (
                                        <div className="space-y-8 animate-in">
                                            <div className="text-center space-y-2">
                                                <h2 className="text-3xl font-black text-slate-800 tracking-tight">연수 선택</h2>
                                                <p className="text-slate-400 font-medium">참석하신 연수 일정을 선택해 주세요</p>
                                            </div>
                                            <div className="space-y-4">
                                                {trainings.map(t => (
                                                    <button key={t.id} onClick={() => { 
                                                        setSelectedTraining(t); 
                                                        setStep(2); 
                                                        fetchRegistrations(t.id); // 유저 뷰에서도 중복 확인을 위해 명단 로드
                                                    }} className="w-full group text-left p-6 rounded-3xl border-2 border-slate-50 hover:border-indigo-200 hover:bg-slate-50/50 transition-all flex items-center justify-between">
                                                        <div className="flex-1">
                                                            <p className="font-black text-slate-700 text-lg group-hover:text-indigo-700">{t.title}</p>
                                                            <div className="flex gap-4 text-xs text-slate-300 font-bold mt-1.5 uppercase">
                                                                <span className="flex items-center gap-1"><MapPin size={12} /> {t.location}</span>
                                                                <span className="flex items-center gap-1"><Clock size={12} /> {formatTime(t.startTime)}{formatTime(t.endTime) ? ` ~ ${formatTime(t.endTime)}` : ' ~'}</span>
                                                            </div>
                                                        </div>
                                                        <div className="w-10 h-10 bg-slate-50 group-hover:bg-indigo-600 group-hover:text-white rounded-2xl flex items-center justify-center transition-all">
                                                            <ChevronRight size={20} />
                                                        </div>
                                                    </button>
                                                ))}
                                                {trainings.length === 0 && <div className="text-center py-10 text-slate-300 font-bold italic">현재 열려있는 연수가 없습니다.</div>}
                                            </div>
                                        </div>
                                    )}

                                    {step === 2 && (
                                        <div className="space-y-8 animate-in">
                                            <button onClick={() => setStep(1)} className="text-slate-300 hover:text-indigo-600 flex items-center gap-1.5 text-xs font-black uppercase tracking-widest"><ArrowLeft size={14} /> BACK</button>
                                            <div className="text-center space-y-2">
                                                <h2 className="text-3xl font-black text-slate-800 tracking-tight">본인 확인</h2>
                                                <p className="text-slate-400 font-medium">성함을 검색하여 선택해 주세요</p>
                                            </div>
                                            <div className="relative group">
                                                <Search className="absolute left-6 top-1/2 -translate-y-1/2 text-slate-300 group-focus-within:text-indigo-500 transition-colors" size={20} />
                                                <input type="text" placeholder="성함 입력 시 자동 검색" value={searchName} onChange={e => setSearchName(e.target.value)}
                                                    className="w-full pl-16 pr-6 py-5 rounded-3xl border-2 border-slate-50 focus:border-indigo-400 bg-slate-50/50 focus:bg-white outline-none text-xl font-bold transition-all shadow-inner" />
                                            </div>
                                            <div className="space-y-3 max-h-64 overflow-y-auto pr-2 custom-scroll">
                                                {filteredStaffList.map(s => (
                                                    <button key={s.id} onClick={() => { 
                                                        setChosenStaff(s); 
                                                        const alreadyReg = selectedRegs.some(r => r.name === s.name);
                                                        if (alreadyReg) {
                                                            setShowOverwriteConfirm(true);
                                                        } else {
                                                            setStep(3);
                                                        }
                                                    }} className="w-full flex items-center justify-between p-5 rounded-2xl border border-slate-50 hover:border-indigo-100 hover:bg-indigo-50/30 transition-all animate-in group">
                                                        <div><span className="font-black text-slate-700 text-lg">{s.name}</span> <span className="text-xs text-slate-300 font-black ml-3 uppercase tracking-tighter">{s.position}</span></div>
                                                        <span className="text-xs font-black text-indigo-400 bg-indigo-50 px-3 py-1.5 rounded-xl opacity-0 group-hover:opacity-100 transition-opacity">SELECT</span>
                                                    </button>
                                                ))}
                                                {searchName.length > 0 && filteredStaffList.length === 0 && <div className="text-center py-6 text-slate-300 font-bold">검색 결과가 없습니다.</div>}
                                            </div>
                                        </div>
                                    )}

                                    {step === 3 && (
                                        <div className="space-y-10 animate-in text-center flex-1 flex flex-col justify-center">
                                            <div className="absolute top-8 left-8">
                                                <button onClick={() => setStep(2)} className="text-slate-300 hover:text-indigo-600 flex items-center gap-1.5 text-xs font-black uppercase tracking-widest"><ArrowLeft size={14} /> BACK</button>
                                            </div>
                                            <div className="space-y-3">
                                                <div className="w-20 h-20 bg-indigo-50 rounded-[2rem] flex items-center justify-center mx-auto mb-4 border-2 border-white shadow-xl">
                                                    <UserCheck size={36} className="text-indigo-600" />
                                                </div>
                                                <h2 className="text-3xl font-black text-slate-800 tracking-tight">{chosenStaff.name}님, 확인되었습니다</h2>
                                                <p className="text-slate-400 font-medium">참석 여부와 방식의 하나를 선택해 주세요</p>
                                            </div>
                                            <div className="grid grid-cols-2 gap-6">
                                                <button onClick={() => { setRegStatus('attended'); setStep(4); }} className="p-8 rounded-[2rem] border-2 border-slate-50 hover:border-indigo-500 bg-slate-50/30 hover:bg-white transition-all group flex flex-col items-center gap-4 shadow-sm hover:shadow-xl">
                                                    <div className="w-14 h-14 bg-white text-indigo-600 rounded-2xl flex items-center justify-center shadow-md group-hover:scale-110 transition-transform"><PenTool size={28} /></div>
                                                    <span className="font-black text-lg text-slate-700">참석 (서명)</span>
                                                </button>
                                                <button onClick={() => { setRegStatus('absent'); setStep(4); }} className="p-8 rounded-[2rem] border-2 border-slate-50 hover:border-rose-500 bg-slate-50/30 hover:bg-white transition-all group flex flex-col items-center gap-4 shadow-sm hover:shadow-xl">
                                                    <div className="w-14 h-14 bg-white text-rose-500 rounded-2xl flex items-center justify-center shadow-md group-hover:scale-110 transition-transform"><XCircle size={28} /></div>
                                                    <span className="font-black text-lg text-slate-700">불참 (기타)</span>
                                                </button>
                                            </div>
                                        </div>
                                    )}

                                    {step === 4 && (
                                        <div className="space-y-8 animate-in text-center flex-1 flex flex-col">
                                            <div className="absolute top-8 left-8">
                                                <button onClick={() => setStep(3)} className="text-slate-300 hover:text-indigo-600 flex items-center gap-1.5 text-xs font-black uppercase tracking-widest"><ArrowLeft size={14} /> BACK</button>
                                            </div>
                                            <div className="space-y-2">
                                                <h2 className="text-3xl font-black text-slate-800 tracking-tight">
                                                    {regStatus === 'attended' ? '서명' : '사유 선택'}
                                                </h2>
                                                <p className="text-slate-400 font-medium">
                                                    {regStatus === 'attended' ? '아래 공간에 서명해 주세요' : '불참하시는 사유를 선택해 주세요'}
                                                </p>
                                            </div>

                                            {regStatus === 'attended' ? (
                                                <div className="space-y-6 flex-1 flex flex-col">
                                                    <div className="canvas-container flex-1 bg-slate-50 border-4 border-dashed border-slate-100 rounded-[2rem] relative shadow-inner overflow-hidden min-h-[220px]">
                                                        <canvas ref={canvasRef} width={1000} height={500}
                                                            onMouseDown={startDrawing} onMouseMove={draw} onMouseUp={() => setIsDrawing(false)}
                                                            onTouchStart={startDrawing} onTouchMove={draw} onTouchEnd={() => setIsDrawing(false)}
                                                            className="absolute inset-0 w-full h-full cursor-crosshair" />
                                                    </div>
                                                    <div className="flex justify-between items-center px-2">
                                                        <button onClick={() => { const ctx = canvasRef.current.getContext('2d'); ctx.clearRect(0, 0, 1000, 500); }}
                                                            className="text-xs font-black text-rose-400 hover:text-rose-600 uppercase tracking-widest flex items-center gap-1">
                                                            <Trash2 size={14} /> 전체 지우기
                                                        </button>
                                                        <span className="text-[10px] font-black text-slate-300 italic">서명 후 [등록 완료] 버튼을 눌러주세요</span>
                                                    </div>
                                                </div>
                                            ) : (
                                                <div className="grid grid-cols-2 gap-3 flex-1">
                                                    {ABSENCE_REASONS.map(r => (
                                                        <button key={r} onClick={() => setAbsenceReason(r)}
                                                            className={`p-4 rounded-2xl border-2 transition-all font-black ${absenceReason === r ? 'border-indigo-600 bg-indigo-50 text-indigo-700 shadow-lg' : 'border-slate-50 text-slate-300 hover:bg-slate-50 hover:text-slate-500'}`}>
                                                            {r}
                                                        </button>
                                                    ))}
                                                </div>
                                            )}

                                            <button disabled={isLoading || (regStatus === 'absent' && !absenceReason)} onClick={handleRegister}
                                                className="w-full bg-indigo-600 text-white font-black py-5 rounded-[1.8rem] hover:bg-indigo-700 shadow-xl shadow-indigo-200 transition-all text-xl disabled:bg-slate-200 disabled:shadow-none flex items-center justify-center gap-3">
                                                {isLoading ? <Loader2 className="animate-spin" /> : <CheckCircle2 size={24} />}
                                                등록 완료
                                            </button>
                                        </div>
                                    )}

                                    {step === 5 && (
                                        <div className="text-center py-10 space-y-10 animate-in flex flex-col items-center justify-center flex-1">
                                            <div className="relative">
                                                <div className="absolute inset-0 bg-emerald-400 blur-2xl opacity-20 animate-pulse"></div>
                                                <div className="relative w-28 h-28 bg-emerald-50 text-emerald-500 rounded-full flex items-center justify-center border-4 border-white shadow-2xl">
                                                    <CheckCircle2 size={64} strokeWidth={2.5} />
                                                </div>
                                            </div>
                                            <div className="space-y-4">
                                                <h2 className="text-4xl font-black text-slate-800 tracking-tighter">등록이 완료되었습니다!</h2>
                                                <p className="text-slate-400 font-bold px-4 leading-relaxed">성실하게 연수에 참여해 주셔서 감사합니다.<br />이제 창을 닫으셔도 좋습니다.</p>
                                            </div>
                                            <div className="w-full max-w-xs pt-4">
                                                <button onClick={() => { setStep(1); setSearchName(''); setAbsenceReason(''); setSelectedTraining(null); }}
                                                    className="w-full bg-slate-900 text-white px-8 py-5 rounded-[1.5rem] font-black text-lg btn-hover">처음으로</button>
                                            </div>
                                        </div>
                                    )}
                                </div>
                                <p className="text-center text-[10px] text-slate-300 font-black mt-8 tracking-[0.3em] uppercase opacity-50">School Training Management System v2.0</p>
                            </div>
                        )}
                    </main>

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
